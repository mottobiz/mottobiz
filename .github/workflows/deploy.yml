name: Deploy to Hostinger

# Fully automated: push to main → GitHub Actions runner builds the site,
# then ships the deployable output to Hostinger via SSH + rsync.
#
# Last updated: 2026-07-23
# Architecture: build on runner, deploy via plain `rsync -e ssh` in a run step.
# Using plain shell instead of appleboy/scp-action because that action's
# `envs:`/secret expansion has been unreliable for our use case.
#
# Repo: mottobiz/mottobiz
# Domain: mottobiz.com
# Companion doc: ../DEPLOYMENT.md

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Cancel any in-flight run for the same branch. Two pushes within 30s would
# otherwise race and could overwrite each other's files mid-upload.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # --- 1. Webhook first (free, may silently no-op) ---
      - name: Trigger Hostinger deploy webhook
        if: ${{ secrets.HOSTINGER_DEPLOY_TOKEN != '' }}
        continue-on-error: true
        run: |
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X POST "https://webhooks.hostinger.com/deploy/${{ secrets.HOSTINGER_DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"event":"push","branch":"main"}' || echo "000")
          echo "Hostinger webhook: HTTP=$HTTP_CODE (non-200 is fine; rsync step is the real deploy)"

      # --- 2. Checkout source ---
      - name: Checkout
        uses: actions/checkout@v4

      # --- 3. Set up Node.js ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --- 4. Install dependencies ---
      - name: Install dependencies
        run: npm ci

      # --- 5. Build + prerender all routes ---
      - name: Build and prerender
        run: npm run build:full
        env:
          CI: true

      # --- 6. Verify build output looks sane ---
      - name: Verify build output
        run: |
          set -e
          echo "=== Build output sanity checks ==="
          test -f index.html   || { echo "FAIL: index.html missing"; exit 1; }
          test -f .htaccess    || { echo "FAIL: .htaccess missing"; exit 1; }
          test -f sitemap.xml  || { echo "FAIL: sitemap.xml missing"; exit 1; }
          test -d assets       || { echo "FAIL: assets/ dir missing"; exit 1; }
          test -d resources    || { echo "FAIL: resources/ prerendered dir missing"; exit 1; }
          test -d industries   || { echo "FAIL: industries/ prerendered dir missing"; exit 1; }
          test -d locations    || { echo "FAIL: locations/ prerendered dir missing"; exit 1; }
          JS_COUNT=$(ls assets/*.js 2>/dev/null | wc -l)
          echo "Build output: $JS_COUNT JS bundles"
          if [ "$JS_COUNT" -lt 1 ]; then
            echo "FAIL: no JS bundles produced"; exit 1
          fi
          echo "✅ Build output looks good"

      # --- 7. Install SSH key on the runner with strict perms ---
      - name: Setup SSH key
        run: |
          set -e
          mkdir -p ~/.ssh
          # Write the key from the secret with strict perms, LF-only
          printf '%s' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/mottobiz_deploy
          chmod 600 ~/.ssh/mottobiz_deploy
          # Verify it parses
          ssh-keygen -y -f ~/.ssh/mottobiz_deploy > /dev/null
          echo "✅ SSH key installed and parseable"
          echo "Host hostinger" > ~/.ssh/config
          echo "  HostName ${{ secrets.HOSTINGER_SSH_HOST }}" >> ~/.ssh/config
          echo "  Port ${{ secrets.HOSTINGER_SSH_PORT }}" >> ~/.ssh/config
          echo "  User ${{ secrets.HOSTINGER_SSH_USER }}" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/mottobiz_deploy" >> ~/.ssh/config
          echo "  StrictHostKeyChecking accept-new" >> ~/.ssh/config
          echo "  UserKnownHostsFile ~/.ssh/known_hosts" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      # --- 8. Verify SSH connectivity with retry (hostinger occasionally rate-limits) ---
      - name: Verify SSH connection
        run: |
          set -e
          DEPLOY_USER="${{ secrets.HOSTINGER_SSH_USER }}"
          DEPLOY_PATH="/home/${DEPLOY_USER}/domains/mottobiz.com/public_html"
          echo "Will deploy to: $DEPLOY_PATH"
          echo "$DEPLOY_PATH" > /tmp/deploy_path

          # Retry up to 3 times with backoff (hostinger sometimes drops connections)
          ATTEMPTS=0
          until [ $ATTEMPTS -ge 3 ]; do
            ATTEMPTS=$((ATTEMPTS+1))
            echo "SSH attempt $ATTEMPTS..."
            if ssh -o ConnectTimeout=20 -o ServerAliveInterval=15 hostinger 'echo "✅ SSH OK as $(whoami)"; pwd; ls -la "$DEPLOY_PATH" 2>/dev/null | head -3'; then
              echo "✅ SSH verified on attempt $ATTEMPTS"
              exit 0
            fi
            echo "Attempt $ATTEMPTS failed, sleeping $((ATTEMPTS*10))s..."
            sleep $((ATTEMPTS*10))
          done
          echo "❌ SSH failed after 3 attempts"
          exit 1

      # --- 9. Rsync deployable output to Hostinger ---
      - name: Rsync to Hostinger
        run: |
          set -e
          DEPLOY_PATH=$(cat /tmp/deploy_path)
          echo "Deploying to $DEPLOY_PATH"

          rsync -avz --delete \
            -e "ssh -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=3" \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='src' \
            --exclude='scripts' \
            --exclude='dist' \
            --exclude='public' \
            --exclude='.github' \
            --exclude='mottobiz' \
            --exclude='screenshots' \
            --exclude='content' \
            --exclude='.ssh-key' \
            --exclude='.agents' \
            --exclude='.verdent' \
            --exclude='.claude' \
            --exclude='.env.example' \
            --exclude='*.md' \
            --exclude='*.ps1' \
            --exclude='*.bat' \
            --exclude='.htaccess.backup' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='tsconfig.json' \
            --exclude='vite.config.ts' \
            --exclude='.gitignore' \
            ./ "$DEPLOY_PATH/"

          echo "✅ Rsync complete"

      # --- 10. Set perms on the server side ---
      - name: Fix permissions on Hostinger
        run: |
          set -e
          DEPLOY_PATH=$(cat /tmp/deploy_path)
          ssh hostinger "cd '$DEPLOY_PATH' && find . -type d -exec chmod 755 {} \; && find . -type f -exec chmod 644 {} \;"
          echo "✅ Permissions set (755 dirs, 644 files)"

      # --- 11. Verify live deploy ---
      - name: Verify live deploy
        if: success()
        run: |
          sleep 5  # Allow Hostinger's edge cache to pick up the new files
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" "https://mottobiz.com/?v=$GITHUB_SHA" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ https://mottobiz.com/ responds 200"
          else
            echo "⚠️ https://mottobiz.com/ responded $HTTP_CODE (rsync still succeeded; live may be cached)"
          fi
          # Also verify a key article page canonical
          CANONICAL=$(curl -sS "https://mottobiz.com/resources/real-estate-automation-vesu/?v=$GITHUB_SHA" | grep -oE '<link[^>]*canonical[^>]*>' | head -1 || echo "missing")
          echo "Article canonical: $CANONICAL"
